<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Change Password — Brew & Scoop</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-main.css') }}">
</head>
<body class="login-page">
  <div class="login-layout">
    <aside class="login-hero">
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="Brew & Scoop"
        class="login-logo"
        width="380"
        height="380"
      >
      <p>Stock Management System</p>
      <span class="login-hero-tagline">Coffee · Tea · Juice & More</span>
    </aside>

    <main class="login-panel">
      <div class="login-shell">
        <div class="login-card">
          <h2>Set a new password</h2>
          <p class="login-subtitle">Your account was created by an administrator. Choose a personal password to continue.</p>

          <form id="change-password-form" class="login-form">
            <div class="form-group">
              <label for="current-password">Current password</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="current-password" name="current_password" autocomplete="current-password" required autofocus placeholder="Temporary password from admin">
              </div>
            </div>
            <div class="form-group">
              <label for="new-password">New password</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="new-password" name="new_password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters">
              </div>
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm new password</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required minlength="6" placeholder="Repeat new password">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-change-password">
              Update password &amp; continue
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    function toast(message, type = "success") {
      const container = document.getElementById("toast-container");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    document.getElementById("change-password-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById("new-password").value;
      const confirmPassword = document.getElementById("confirm-password").value;

      if (newPassword !== confirmPassword) {
        toast("New passwords do not match", "error");
        return;
      }

      const btn = document.getElementById("btn-change-password");
      btn.disabled = true;

      try {
        const res = await fetch("/api/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            current_password: document.getElementById("current-password").value,
            new_password: newPassword,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Could not update password");

        window.location.href = "/";
      } catch (err) {
        toast(err.message, "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
