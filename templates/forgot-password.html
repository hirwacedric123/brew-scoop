<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password — Brew & Scoop</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-main.css') }}">
</head>
<body class="login-page">
  <div class="login-layout">
    <aside class="login-hero">
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="Brew & Scoop"
        class="login-logo"
        width="380"
        height="380"
      >
      <p>Stock Management System</p>
      <span class="login-hero-tagline">Coffee · Tea · Juice & More</span>
    </aside>

    <main class="login-panel">
      <div class="login-shell">
        <div class="login-card">
          <h2>Forgot password?</h2>
          <p class="login-subtitle">Enter the email on your account. We will send your username and a password reset link.</p>

          <form id="forgot-password-form" class="login-form">
            <div class="form-group">
              <label for="forgot-email">Email</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg>
                <input type="email" id="forgot-email" name="email" autocomplete="email" required autofocus placeholder="you@example.com">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-forgot-password">
              Send reset link
            </button>
          </form>

          <p class="login-form-footer">
            <a href="{{ url_for('login') }}">Back to sign in</a>
          </p>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    function toast(message, type = "success") {
      const container = document.getElementById("toast-container");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }

    document.getElementById("forgot-password-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-forgot-password");
      btn.disabled = true;

      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: document.getElementById("forgot-email").value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Could not send reset email");

        toast(data.message || "Check your email for a reset link.");
        document.getElementById("forgot-password-form").reset();
      } catch (err) {
        toast(err.message, "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
