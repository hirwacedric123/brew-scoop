<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In — Brew & Scoop</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login-main.css') }}">
</head>
<body class="login-page">
  <div class="login-layout">
    <aside class="login-hero">
      <img
        src="{{ url_for('static', filename='img/logo.png') }}"
        alt="Brew & Scoop"
        class="login-logo"
        width="380"
        height="380"
      >
      <p>Stock Management System</p>
      <span class="login-hero-tagline">Coffee · Tea · Juice & More</span>
    </aside>

    <main class="login-panel">
      <div class="login-shell">
        <div class="login-card">
          <h2>Welcome back</h2>
          <p class="login-subtitle">Sign in to manage inventory and sales</p>

          <form id="login-form" class="login-form">
            <div class="form-group">
              <label for="login-username">Username</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="login-username" name="username" autocomplete="username" required autofocus placeholder="your.username">
              </div>
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <div class="input-with-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="••••••••">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-login">
              Sign In
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    function toast(message, type = "success") {
      const container = document.getElementById("toast-container");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-login");
      btn.disabled = true;

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("login-username").value,
            password: document.getElementById("login-password").value,
          }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Login failed");

        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get("next") || "/";
      } catch (err) {
        toast(err.message, "error");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
